<!DOCTYPE html>
<html lang="sl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tech Stocks Live</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    body { font-family: system-ui, sans-serif; background: #0a0a0a; color: white; }
    .price { font-size: 2.2rem; font-weight: 700; }
    .card { background: #18181b; border-radius: 18px; }
    canvas { max-height: 155px; }
  </style>
</head>
<body class="p-3 max-w-6xl mx-auto">

  <div class="text-center mb-6">
    <h1 class="text-3xl font-bold">Tech Stocks Live</h1>
    <p id="last-update" class="text-zinc-400 text-sm"></p>
  </div>

  <div id="container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5"></div>

  <p class="text-center text-xs text-zinc-500 mt-10">
    Osvežuje se vsakih 45 sekund
  </p>

  <script>
    let stockHistory = {}; // tu shranjujemo podatke za grafe

    const symbols = ["NVDA", "AAPL", "MSFT", "META", "AMZN", "TSLA", "AMD"];

    async function getStockData(symbol) {
      try {
        const url = `https://api.allorigins.win/get?url=${encodeURIComponent(`https://query2.finance.yahoo.com/v8/finance/chart/${symbol}?interval=5m&range=1d`)}`;
        const res = await fetch(url);
        const data = await res.json();
        const json = JSON.parse(data.contents);
        const result = json.chart.result[0];
        const meta = result.meta;
        const timestamps = result.timestamp;
        const closes = result.indicators.quote[0].close;

        const price = meta.regularMarketPrice || meta.previousClose;
        const changePct = ((price - meta.previousClose) / meta.previousClose) * 100;

        // Shranimo za graf
        if (!stockHistory[symbol]) stockHistory[symbol] = {labels: [], prices: []};
        const history = stockHistory[symbol];
        history.labels.push(new Date().toLocaleTimeString('sl-SI', {hour:'2-digit', minute:'2-digit'}));
        history.prices.push(price);
        if (history.labels.length > 40) {
          history.labels.shift();
          history.prices.shift();
        }

        return {
          symbol,
          price: price.toFixed(2),
          changePct: changePct.toFixed(2),
          high: meta.regularMarketDayHigh ? meta.regularMarketDayHigh.toFixed(2) : "—",
          low: meta.regularMarketDayLow ? meta.regularMarketDayLow.toFixed(2) : "—",
          labels: history.labels,
          prices: history.prices
        };
      } catch (e) {
        return null;
      }
    }

    function getSignal(pct) {
      const change = parseFloat(pct);
      if (change <= -1.7) return {color: "bg-emerald-600", text: "MOČAN PAD - Kupi"};
      if (change <= -0.9) return {color: "bg-emerald-500", text: "Dober padec"};
      if (change <= -0.4) return {color: "bg-amber-500", text: "Majhen padec"};
      return {color: "bg-zinc-600", text: "Nevtralno"};
    }

    function createChart(canvasId, labels, prices) {
      const ctx = document.getElementById(canvasId);
      if (!ctx) return;
      new Chart(ctx, {
        type: 'line',
        data: {
          labels: labels,
          datasets: [{ 
            data: prices, 
            borderColor: '#22c55e', 
            borderWidth: 2.5, 
            tension: 0.35,
            pointRadius: 0 
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            y: { grid: { color: '#27272a' }, ticks: { color: '#888', font: {size: 10} } },
            x: { grid: { color: '#27272a' }, ticks: { color: '#888', maxTicksLimit: 6, font: {size: 10} } }
          }
        }
      });
    }

    async function updateAll() {
      const container = document.getElementById('container');
      container.innerHTML = `<p class="text-center py-10 col-span-full text-zinc-400">Nalagam podatke...</p>`;

      let html = '';
      for (let sym of symbols) {
        const data = await getStockData(sym);
        if (!data) continue;

        const signal = getSignal(data.changePct);
        const isPositive = parseFloat(data.changePct) >= 0;

        const canvasId = `chart-${sym}`;

        html += `
          <div class="card p-4">
            <div class="flex justify-between items-center mb-3">
              <div class="font-bold text-xl">${sym}</div>
              <div class="text-right">
                <div class="price">${data.price}</div>
                <div class="${isPositive ? 'text-emerald-400' : 'text-red-400'} text-sm">
                  ${isPositive ? '+' : ''}${data.changePct}%
                </div>
              </div>
            </div>

            <div class="text-xs text-zinc-400 flex justify-between mb-3">
              <div>High: <span class="text-white">${data.high}</span></div>
              <div>Low: <span class="text-white">${data.low}</span></div>
            </div>

            <div style="height: 155px;">
              <canvas id="${canvasId}"></canvas>
            </div>

            <div class="${signal.color} text-white text-center py-2.5 rounded-xl text-sm font-medium mt-3">
              ${signal.text}
            </div>
          </div>`;
      }

      container.innerHTML = html;

      // Ustvari grafe
      setTimeout(() => {
        symbols.forEach(sym => {
          const data = stockHistory[sym];
          if (data && data.labels.length > 1) {
            createChart(`chart-${sym}`, data.labels, data.prices);
          }
        });
      }, 400);

      document.getElementById('last-update').textContent = `Zadnja osvežitev: ${new Date().toLocaleTimeString('sl-SI')}`;
    }

    updateAll();
    setInterval(updateAll, 45000);
  </script>
</body>
</html>
