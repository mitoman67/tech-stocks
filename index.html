<!DOCTYPE html>
<html lang="sl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tech Stocks Live</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0a0a0a;
      color: white;
    }
    .price {
      font-size: 2.75rem;
      font-weight: 700;
      line-height: 1;
    }
    .card {
      background: #18181b;
      border-radius: 20px;
    }
  </style>
</head>
<body class="p-4 max-w-md mx-auto min-h-screen">

  <div class="text-center mb-6">
    <h1 class="text-3xl font-bold">Tech Stocks Live</h1>
    <p class="text-zinc-400 text-sm mt-1">Intraday pregled • Osvežuje se vsakih 20s</p>
  </div>

  <div id="stocks-container"></div>

  <div class="text-center text-xs text-zinc-500 mt-10">
    Vir: Yahoo Finance • Ni finančni nasvet<br>
    Majhni padci za dnevno trgovanje
  </div>

  <script>
    const stocks = [
      { symbol: "NVDA", name: "Nvidia" },
      { symbol: "AAPL", name: "Apple" },
      { symbol: "MSFT", name: "Microsoft" },
      { symbol: "META", name: "Meta" },
      { symbol: "AMZN", name: "Amazon" },
      { symbol: "TSLA", name: "Tesla" },
      { symbol: "AMD",  name: "AMD" }
    ];

    async function fetchStockData(symbol) {
      try {
        const response = await fetch(`https://query1.finance.yahoo.com/v8/finance/quote?symbols=${symbol}`);
        const data = await response.json();
        const q = data.quoteResponse.result[0];

        if (!q) return null;

        return {
          symbol: symbol,
          name: q.shortName || q.longName,
          price: q.regularMarketPrice,
          change: q.regularMarketChange,
          changePct: q.regularMarketChangePercent,
          dayHigh: q.regularMarketDayHigh,
          dayLow: q.regularMarketDayLow,
          previousClose: q.regularMarketPreviousClose
        };
      } catch (error) {
        console.error(`Napaka pri ${symbol}:`, error);
        return null;
      }
    }

    function getBuySignal(changePct) {
      if (changePct <= -1.8) return { score: 5, color: "bg-emerald-600", text: "MOČAN PADEC – Zelo zanimivo" };
      if (changePct <= -1.0) return { score: 4, color: "bg-emerald-500", text: "Dober padec – vstopna priložnost" };
      if (changePct <= -0.5) return { score: 3, color: "bg-amber-500", text: "Majhen padec" };
      if (changePct <= 0.5)  return { score: 2, color: "bg-zinc-600", text: "Nevtralno" };
      return { score: 1, color: "bg-red-600", text: "Previsoko" };
    }

    async function updateDashboard() {
      const container = document.getElementById('stocks-container');
      container.innerHTML = '<p class="text-center text-zinc-400 py-8">Nalagam podatke...</p>';

      let html = '';

      for (let stock of stocks) {
        const data = await fetchStockData(stock.symbol);
        if (!data) continue;

        const signal = getBuySignal(data.changePct);

        html += `
          <div class="card p-5 mb-5 shadow-xl">
            <div class="flex justify-between items-start">
              <div>
                <div class="font-bold text-2xl">${stock.name}</div>
                <div class="text-zinc-400">${stock.symbol}</div>
              </div>
              <div class="text-right">
                <div class="price">${data.price.toFixed(2)}</div>
                <div class="${data.changePct >= 0 ? 'text-emerald-400' : 'text-red-400'} font-medium">
                  ${data.changePct.toFixed(2)}%
                </div>
              </div>
            </div>

            <div class="grid grid-cols-2 gap-4 mt-6 text-sm">
              <div>
                <span class="text-zinc-400">Danes High:</span><br>
                <span class="font-semibold">${data.dayHigh ? data.dayHigh.toFixed(2) : '—'}</span>
              </div>
              <div>
                <span class="text-zinc-400">Danes Low:</span><br>
                <span class="font-semibold">${data.dayLow ? data.dayLow.toFixed(2) : '—'}</span>
              </div>
            </div>

            <div class="mt-5 ${signal.color} text-white font-medium text-center py-3 rounded-2xl text-base">
              \( {signal.text} ( \){signal.score}/5)
            </div>
          </div>`;
      }

      container.innerHTML = html;
    }

    // Zaženi ob nalaganju in osvežuj vsakih 20 sekund
    updateDashboard();
    setInterval(updateDashboard, 20000);
  </script>
</body>
</html>
