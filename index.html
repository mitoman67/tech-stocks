<!DOCTYPE html>
<html lang="sl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tech Stocks Live</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: system-ui, sans-serif; background: #0a0a0a; color: white; }
    .price { font-size: 2.7rem; font-weight: 700; }
    .card { background: #18181b; border-radius: 20px; }
  </style>
</head>
<body class="p-4 max-w-md mx-auto">

  <div class="text-center mb-6">
    <h1 class="text-3xl font-bold">Tech Stocks Live</h1>
    <p class="text-zinc-400 text-sm">Osvežuje se vsakih 45 sekund</p>
  </div>

  <div id="container" class="space-y-5"></div>

  <p class="text-center text-xs text-zinc-500 mt-10">
    Vir: Yahoo Finance (proxy) • Ni finančni nasvet
  </p>

  <script>
    const symbols = ["NVDA", "AAPL", "MSFT", "META", "AMZN", "TSLA", "AMD"];

    async function getStock(symbol) {
      try {
        const url = `https://api.allorigins.win/get?url=${encodeURIComponent(`https://query2.finance.yahoo.com/v8/finance/chart/${symbol}?interval=5m&range=1d`)}`;
        const res = await fetch(url);
        const data = await res.json();
        const json = JSON.parse(data.contents);
        const result = json.chart.result[0];
        const meta = result.meta;

        const price = meta.regularMarketPrice || meta.previousClose;
        const change = price - meta.previousClose;
        const changePct = (change / meta.previousClose) * 100;

        return {
          symbol,
          price: price.toFixed(2),
          changePct: changePct.toFixed(2),
          dayHigh: meta.regularMarketDayHigh?.toFixed(2) || "—",
          dayLow: meta.regularMarketDayLow?.toFixed(2) || "—"
        };
      } catch (e) {
        return null;
      }
    }

    function getSignal(pct) {
      const change = parseFloat(pct);
      if (change <= -1.7) return {score: 5, color: "bg-emerald-600", text: "MOČAN PADEC – Odlična priložnost"};
      if (change <= -0.9) return {score: 4, color: "bg-emerald-500", text: "Dober padec – vstop"};
      if (change <= -0.4) return {score: 3, color: "bg-amber-500", text: "Majhen padec"};
      return {score: 2, color: "bg-zinc-600", text: "Nevtralno"};
    }

    async function updateAll() {
      const container = document.getElementById('container');
      container.innerHTML = `<p class="text-center py-8 text-zinc-400">Nalagam cene...</p>`;

      let html = '';
      for (let sym of symbols) {
        const data = await getStock(sym);
        if (!data) continue;

        const signal = getSignal(data.changePct);

        html += `
          <div class="card p-5">
            <div class="flex justify-between items-start">
              <div class="font-bold text-2xl">${sym}</div>
              <div class="text-right">
                <div class="price">${data.price}</div>
                <div class="${parseFloat(data.changePct) >= 0 ? 'text-emerald-400' : 'text-red-400'}">
                  ${parseFloat(data.changePct) >= 0 ? '+' : ''}${data.changePct}%
                </div>
              </div>
            </div>
            <div class="mt-4 grid grid-cols-2 text-sm">
              <div>High: <span class="font-medium">${data.dayHigh}</span></div>
              <div>Low: <span class="font-medium">${data.dayLow}</span></div>
            </div>
            <div class="mt-5 ${signal.color} py-3 rounded-2xl text-center font-medium">
              ${signal.text} (${signal.score}/5)
            </div>
          </div>`;
      }
      container.innerHTML = html;
    }

    // Zaženi in osvežuj vsakih 10 minut
    updateAll();
    setInterval(updateAll, 600000);
  </script>
</body>
</html>
