<!DOCTYPE html>
<html lang="sl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tech Stocks Live</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: system-ui, sans-serif; background: #0a0a0a; color: white; }
    .price { font-size: 2.6rem; font-weight: 700; }
    .card { background: #18181b; border-radius: 20px; }
  </style>
</head>
<body class="p-4 max-w-md mx-auto">

  <div class="text-center mb-6">
    <h1 class="text-3xl font-bold">Tech Stocks Live</h1>
    <p class="text-zinc-400 text-sm">Intraday pregled • Osvežuje se vsakih 25 sekund</p>
  </div>

  <div id="container" class="space-y-5"></div>

  <p class="text-center text-xs text-zinc-500 mt-10">
    Vir: Yahoo Finance (preko proxy) • Ni finančni nasvet
  </p>

  <script>
    const symbols = ["NVDA", "AAPL", "MSFT", "META", "AMZN", "TSLA", "AMD"];

    async function getStock(symbol) {
      try {
        // Bolj stabilen proxy + chart endpoint
        const url = `https://api.allorigins.win/get?url=${encodeURIComponent(`https://query2.finance.yahoo.com/v8/finance/chart/${symbol}?interval=5m&range=1d`)}`;
        
        const res = await fetch(url);
        const data = await res.json();
        const json = JSON.parse(data.contents);

        const result = json.chart.result[0];
        const meta = result.meta;
        const quote = result.quotes ? result.quotes[result.quotes.length-1] : null;

        const price = meta.regularMarketPrice || meta.previousClose;
        const previousClose = meta.previousClose;
        const change = price - previousClose;
        const changePct = (change / previousClose) * 100;

        return {
          symbol,
          price: price.toFixed(2),
          change: change.toFixed(2),
          changePct: changePct.toFixed(2),
          dayHigh: meta.regularMarketDayHigh ? meta.regularMarketDayHigh.toFixed(2) : "—",
          dayLow: meta.regularMarketDayLow ? meta.regularMarketDayLow.toFixed(2) : "—"
        };
      } catch (e) {
        console.log("Napaka pri " + symbol, e);
        return null;
      }
    }

    function getSignal(changePct) {
      const pct = parseFloat(changePct);
      if (pct <= -1.8) return {score: 5, color: "bg-emerald-600", text: "MOČAN PADEC – Zelo dobra priložnost"};
      if (pct <= -1.0) return {score: 4, color: "bg-emerald-500", text: "Dober padec – vstop"};
      if (pct <= -0.4) return {score: 3, color: "bg-amber-500", text: "Majhen padec"};
      return {score: 2, color: "bg-zinc-600", text: "Nevtralno / previsoko"};
    }

    async function updateAll() {
      const container = document.getElementById('container');
      container.innerHTML = `<p class="text-center py-10 text-zinc-400">Nalagam aktualne cene...</p>`;

      let html = '';

      for (let sym of symbols) {
        const data = await getStock(sym);
        if (!data) {
          html += `<div class="card p-5"><p class="text-red-400">Napaka pri ${sym}</p></div>`;
          continue;
        }

        const signal = getSignal(data.changePct);

        html += `
          <div class="card p-5">
            <div class="flex justify-between">
              <div>
                <div class="text-2xl font-bold">${sym}</div>
              </div>
              <div class="text-right">
                <div class="price">${data.price}</div>
                <div class="${parseFloat(data.changePct) >= 0 ? 'text-emerald-400' : 'text-red-400'}">
                  ${parseFloat(data.changePct) >= 0 ? '+' : ''}${data.changePct}%
                </div>
              </div>
            </div>
            <div class="mt-4 text-sm grid grid-cols-2 gap-4">
              <div>High: <span class="font-medium">${data.dayHigh}</span></div>
              <div>Low: <span class="font-medium">${data.dayLow}</span></div>
            </div>
            <div class="mt-5 ${signal.color} py-3 rounded-2xl text-center font-medium">
              ${signal.text} (${signal.score}/5)
            </div>
          </div>`;
      }

      container.innerHTML = html;
    }

    // Zaženi
    updateAll();
    setInterval(updateAll, 25000);   // vsakih 25 sekund
  </script>
</body>
</html>
