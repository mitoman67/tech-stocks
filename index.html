<!DOCTYPE html>
<html lang="sl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tech Stocks</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: system-ui, sans-serif; background: #0a0a0a; color: white; }
    .price { font-size: 2.1rem; font-weight: 700; }
    .card { background: #18181b; border-radius: 16px; }
  </style>
</head>
<body class="p-3 max-w-md mx-auto">

  <div class="text-center mb-4">
    <h1 class="text-2xl font-bold">Tech Stocks Live</h1>
    <p id="last-update" class="text-zinc-400 text-xs"></p>
  </div>

  <div id="container" class="grid grid-cols-1 gap-4"></div>

  <p class="text-center text-[10px] text-zinc-500 mt-8">
    Osvežuje se vsakih 45 sekund • Vir: Yahoo Finance
  </p>

  <script>
    const symbols = ["NVDA", "AAPL", "MSFT", "META", "AMZN", "TSLA", "AMD"];

    async function getStock(symbol) {
      try {
        const url = `https://api.allorigins.win/get?url=${encodeURIComponent(`https://query2.finance.yahoo.com/v8/finance/chart/${symbol}?interval=5m&range=1d`)}`;
        const res = await fetch(url);
        const data = await res.json();
        const json = JSON.parse(data.contents);
        const result = json.chart.result[0];
        const meta = result.meta;

        const price = meta.regularMarketPrice || meta.previousClose;
        const change = price - meta.previousClose;
        const changePct = (change / meta.previousClose) * 100;

        return {
          symbol,
          price: price.toFixed(2),
          changePct: changePct.toFixed(2),
          high: meta.regularMarketDayHigh ? meta.regularMarketDayHigh.toFixed(2) : "—",
          low: meta.regularMarketDayLow ? meta.regularMarketDayLow.toFixed(2) : "—"
        };
      } catch (e) {
        return null;
      }
    }

    function getSignal(pct) {
      const change = parseFloat(pct);
      if (change <= -1.7) return {color: "bg-emerald-600", text: "MOČAN PAD - Kupi"};
      if (change <= -0.9) return {color: "bg-emerald-500", text: "Dober padec"};
      if (change <= -0.4) return {color: "bg-amber-500", text: "Majhen padec"};
      return {color: "bg-zinc-600", text: "Nevtralno"};
    }

    async function updateAll() {
      const container = document.getElementById('container');
      container.innerHTML = `<p class="text-center py-6 text-zinc-400">Nalagam...</p>`;

      let html = '';
      for (let sym of symbols) {
        const data = await getStock(sym);
        if (!data) continue;

        const signal = getSignal(data.changePct);
        const isPositive = parseFloat(data.changePct) >= 0;

        html += `
          <div class="card p-4">
            <div class="flex justify-between items-center">
              <div>
                <div class="font-bold text-xl">${sym}</div>
              </div>
              <div class="text-right">
                <div class="price">${data.price}</div>
                <div class="${isPositive ? 'text-emerald-400' : 'text-red-400'} text-sm font-medium">
                  ${isPositive ? '+' : ''}${data.changePct}%
                </div>
              </div>
            </div>

            <div class="mt-3 text-xs text-zinc-400 flex justify-between">
              <div>High: <span class="text-white">${data.high}</span></div>
              <div>Low: <span class="text-white">${data.low}</span></div>
            </div>

            <div class="mt-3 ${signal.color} text-white text-center py-2 rounded-xl text-sm font-medium">
              ${signal.text}
            </div>
          </div>`;
      }

      container.innerHTML = html;
      document.getElementById('last-update').textContent = `Zadnja osvežitev: ${new Date().toLocaleTimeString('sl-SI')}`;
    }

    updateAll();
    setInterval(updateAll, 45000); // 45 sekund
  </script>
</body>
</html>
